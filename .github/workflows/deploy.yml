name: Deploy Bot

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 146.190.29.168
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            curl -s https://raw.githubusercontent.com/EstateInvest2013/claude1/main/bot/bot.py -o /opt/tgbot/bot.py
            screen -S tgbot -X quit || true
            screen -S tgbot -dm python3 /opt/tgbot/bot.py
            echo 'Bot deployed!'
